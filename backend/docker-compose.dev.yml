services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: label_printer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - postgres_label_data:/var/lib/postgresql/data
    networks:
      - labelprint-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env.development
    ports:
      - "3080:3080"
    depends_on:
      - postgres
    networks:
      - labelprint-network
    volumes:
      - ./src:/app/src
    environment:
      - NODE_ENV=development

volumes:
  postgres_label_data:
    driver: local

networks:
  labelprint-network:
    driver: bridge
