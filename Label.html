<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>POS Label Editor - Pospal Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="editor-container">

    <header class="editor-header">
        <div class="file-info">
            <span class="file-name">未命名</span>
            <span class="edit-icon">✎</span>
        </div>
        <div class="header-actions">
            <button class="btn-cancel">取消</button>
            <button class="btn-save">保存</button>
        </div>
    </header>

    <main class="editor-main">
        <nav class="icon-nav">
            <div class="nav-item active" data-tab="templates">
                <i class="icon">📄</i>
                <span>模板</span>
            </div>
            <div class="nav-item" data-tab="text">
                <i class="icon">T</i>
                <span>文字</span>
            </div>
            <div class="nav-item" data-tab="params">
                <i class="icon">⚙</i>
                <span>参数</span>
            </div>
            <div class="nav-item" data-tab="image">
                <i class="icon">🖼</i>
                <span>图片</span>
            </div>
        </nav>

        <aside class="sidebar-drawer">
            <div id="panel-templates" class="panel-section active">
                <div class="template-card create-new">
                    <div class="card-preview empty"></div>
                    <button class="btn-use-template">使用空白模板编辑</button>
                </div>

                <div class="template-card">
                    <div class="card-preview">
                        <div class="mini-label">
                            <span class="blue">#[商品名称]</span>
                            <span class="small">#[条码]</span>
                        </div>
                    </div>
                    <button class="btn-use-template">使用此模板编辑</button>
                </div>
                
                <div class="template-card">
                    <div class="card-preview">
                        <div class="mini-label">
                            <span class="title">Hey, 您的奶茶!</span>
                        </div>
                    </div>
                    <button class="btn-use-template">使用此模板编辑</button>
                </div>
            </div>

            <div id="panel-params" class="panel-section" style="display: none;">
                <div class="search-box">
                    <input type="text" placeholder="搜索参数">
                </div>
                <div class="param-list">
                    <div class="draggable-pill" draggable="true">商品名称</div>
                    <div class="draggable-pill" draggable="true">单价</div>
                    <div class="draggable-pill" draggable="true">会员价</div>
                    <div class="draggable-pill highlight" draggable="true">制茶机二维码</div>
                </div>
            </div>
        </aside>

        <section class="canvas-area">
            <div class="ruler-x"></div>
            <div class="ruler-y"></div>
            
            <div class="label-canvas" id="main-canvas" style="width: 400px; height: 600px;">
                <div class="canvas-element selected" style="top: 50px; left: 50px;">
                    编辑文字
                    <div class="resize-handle ne"></div>
                    <div class="resize-handle se"></div>
                    <div class="resize-handle sw"></div>
                    <div class="resize-handle nw"></div>
                </div>
            </div>

            <div class="zoom-tools">
                <button>-</button>
                <span>363%</span>
                <button>+</button>
                <button class="btn-help">? 帮助</button>
            </div>
        </section>

        <aside class="sidebar-right">
            
            <div id="settings-global" class="settings-panel">
                <div class="panel-header">全局</div>
                
                <div class="setting-group">
                    <label class="group-title">模板尺寸 (单位: mm)</label>
                    <div class="input-row">
                        <div class="input-wrap suffix" data-suffix="W">
                            <input type="number" value="40">
                        </div>
                        <div class="lock-icon">🔓</div>
                        <div class="input-wrap suffix" data-suffix="H">
                            <input type="number" value="60">
                        </div>
                    </div>
                </div>

                <div class="setting-group">
                    <div class="group-header">
                        <label class="group-title">打印设置</label>
                        <a href="#" class="link-example">查看示例</a>
                    </div>
                    
                    <div class="grid-2-col">
                        <div class="input-labeled">
                            <span>列数:</span>
                            <input type="number" value="1">
                        </div>
                        <div class="input-labeled">
                            <span>列距:</span>
                            <input type="number" value="0">
                        </div>
                        <div class="input-labeled">
                            <span>上边距:</span>
                            <input type="number" value="0">
                        </div>
                        <div class="input-labeled">
                            <span>左边距:</span>
                            <input type="number" value="0">
                        </div>
                    </div>
                </div>
            </div>

            <div id="settings-element" class="settings-panel" style="display: none;">
                <div class="panel-header">文字</div>
                
                <div class="setting-group">
                    <div class="input-row">
                        <div class="input-wrap suffix" data-suffix="X">
                            <input type="number" value="4.8">
                        </div>
                        <div class="input-wrap suffix" data-suffix="Y">
                            <input type="number" value="9.0">
                        </div>
                    </div>
                    <div class="input-row">
                        <div class="input-wrap suffix" data-suffix="W">
                            <input type="number" value="20">
                        </div>
                        <div class="input-wrap suffix" data-suffix="H">
                            <input type="number" value="2.8">
                        </div>
                    </div>
                </div>

                <div class="setting-group">
                    <label>内容</label>
                    <textarea class="content-editor">编辑文字</textarea>
                </div>
            </div>

        </aside>
    </main>
</body>
</html>
